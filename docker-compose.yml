# Local development: builds the app image from this repository (see Dockerfile).
# For production (Traefik, TLS, Helm, observability), use the gghstats-selfhosted repository.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  gghstats:
    build: .
    container_name: gghstats-local
    restart: unless-stopped
    environment:
      - GGHSTATS_GITHUB_TOKEN=${GGHSTATS_GITHUB_TOKEN}
      - GGHSTATS_HOST=0.0.0.0
      - GGHSTATS_PORT=${GGHSTATS_PORT:-8080}
      - GGHSTATS_FILTER=${GGHSTATS_FILTER:-*}
      - GGHSTATS_SYNC_INTERVAL=${GGHSTATS_SYNC_INTERVAL:-1h}
      - GGHSTATS_DB=${GGHSTATS_DB:-/data/gghstats.db}
      # Optional UI theme: mount a CSS file and set path inside the container (see README "Custom UI theme").
      # - GGHSTATS_CUSTOM_CSS=/data/custom-theme.css
    ports:
      - "${GGHSTATS_PORT:-8080}:${GGHSTATS_PORT:-8080}"
    volumes:
      - ./data:/data
    logging: *default-logging
