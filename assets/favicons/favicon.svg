  <g fill="#121212">
    <rect x="12" y="38" width="12" height="16" rx="0"/>
    <rect x="26" y="28" width="12" height="26" rx="0"/>
    <rect x="40" y="18" width="12" height="36" rx="0"/>
  </g>
</svg>
