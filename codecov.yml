# https://docs.codecov.com/docs/codecov-yaml
codecov:
  require_ci_to_pass: yes

coverage:
  status:
    project:
      default:
        # Align with SPEC §6.1 / make cover (COVER_MIN_PERCENT).
        target: 80%
        threshold: 0%
    patch:
      default:
        informational: true

comment:
  layout: "reach,diff,flags,files,footer"
  behavior: default
