replicaCount: 1

image:
  repository: ghcr.io/hrodrig/gghstats
  tag: "v0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  # Must match env.port (container listen port for Service target and probes).
  port: 8080

env:
  host: "0.0.0.0"
  # Must match service.port.
  port: "8080"
  filter: "*"
  includePrivate: "false"
  syncInterval: "1h"
  apiToken: ""

githubToken:
  existingSecret: ""
  secretName: gghstats-secret
  secretKey: github-token
  value: ""

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}
