version: 2

project_name: gghstats

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: gghstats
    main: ./cmd/gghstats
    binary: gghstats
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/hrodrig/gghstats/internal/version.Version={{.Version}}
      - -X github.com/hrodrig/gghstats/internal/version.Commit={{.ShortCommit}}
      - -X github.com/hrodrig/gghstats/internal/version.BuildDate={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Snapshot / test-release: version from repo VERSION file via Makefile (GGHSTATS_SNAPSHOT_VERSION=<semver>-next).
# Same pattern as pgwd (PGWD_SNAPSHOT_VERSION). Release on a git tag still uses the tag (e.g. v0.5.0).
snapshot:
  version_template: "{{ .Env.GGHSTATS_SNAPSHOT_VERSION }}"

# Docker: multi-arch image to ghcr.io (same pattern as pgwd: dockers_v2 + Dockerfile.release).
# sbom: false — GitHub-hosted runners use the docker buildx driver without attestation support;
# otherwise build fails with: "Attestation is not supported for the docker driver".
dockers_v2:
  - disable: "{{ .IsSnapshot }}"
    dockerfile: Dockerfile.release
    sbom: false
    ids:
      - gghstats
    images:
      - ghcr.io/hrodrig/gghstats
    tags:
      - "v{{ .Version }}"
      - "{{ if not .IsSnapshot }}latest{{ end }}"
    labels:
      org.opencontainers.image.title: "gghstats"
      org.opencontainers.image.description: "GitHub traffic dashboard and CLI"
      org.opencontainers.image.source: "https://github.com/hrodrig/gghstats"
      org.opencontainers.image.version: "{{ .Version }}"
    # No `annotations:` here — GoReleaser passes them as manifest index annotations; GitHub's
    # buildx setup errors with: "index annotations not supported for single platform export".

release:
  github:
    owner: hrodrig
    name: gghstats
  header: |
    ## gghstats {{ .Tag }}
