version: 2

project_name: gghstats

before:
  hooks:
    # Do not run go mod tidy here — it drops the explicit golang.org/x/net pin (see Makefile check-x-net-pin).
    - make check-x-net-pin
    - go test ./...
    - sh -c 'gzip -cn contrib/man/man1/gghstats.1 > contrib/man/man1/gghstats.1.gz'

builds:
  - id: gghstats
    main: ./cmd/gghstats
    binary: gghstats
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
      - openbsd
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/hrodrig/gghstats/internal/version.Version={{.Version}}
      - -X github.com/hrodrig/gghstats/internal/version.Commit={{.ShortCommit}}
      - -X github.com/hrodrig/gghstats/internal/version.BuildDate={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - src: contrib/man/man1/gghstats.1
        dst: share/man/man1/gghstats.1
      - src: LICENSE
        dst: share/doc/gghstats/LICENSE
      - src: contrib/gghstats.env.example
        dst: etc/gghstats/gghstats.env.example
      - src: contrib/openrc/gghstats.initd
        dst: share/openrc/gghstats.initd
      - src: contrib/openbsd/gghstats
        dst: share/openbsd/rc.d/gghstats
      - src: contrib/openbsd/gghstats-serve
        dst: gghstats-serve
      - src: contrib/openbsd/gghstats-start
        dst: gghstats-start

checksum:
  name_template: checksums.txt

# Cosign keyless signing (GitHub Actions OIDC). Requires `id-token: write`
# in release.yml and sigstore/cosign-installer. Signs checksums.txt and
# container images pushed to ghcr.io.
signs:
  - cmd: cosign
    env:
      - COSIGN_EXPERIMENTAL=1
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - --yes
    artifacts: checksum

# SBOM (Software Bill of Materials) generation via syft.
# One SPDX + one CycloneDX document per release (source tree catalog).
# Container image SBOM attestation deferred (docker driver limit).
sboms:
  - id: gghstats-sbom-spdx
    artifacts: source
    documents:
      - "gghstats_{{ .Version }}_sbom.spdx.json"
    args: ["$artifact", "--output", "spdx-json=$document"]
  - id: gghstats-sbom-cdx
    artifacts: source
    documents:
      - "gghstats_{{ .Version }}_sbom.cyclonedx.json"
    args: ["$artifact", "--output", "cyclonedx-json=$document"]

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Snapshot / test-release: version from repo VERSION file via Makefile (GGHSTATS_SNAPSHOT_VERSION=<semver>-next).
# Snapshot version from GGHSTATS_SNAPSHOT_VERSION (Makefile). Release on a git tag uses the tag (e.g. v0.5.0).
snapshot:
  version_template: "{{ .Env.GGHSTATS_SNAPSHOT_VERSION }}"

# Docker: multi-arch image to ghcr.io (dockers_v2 + Dockerfile.release).
# sbom: false — GitHub-hosted runners use the docker buildx driver without attestation support;
# otherwise build fails with: "Attestation is not supported for the docker driver".
dockers_v2:
  - disable: "{{ .IsSnapshot }}"
    dockerfile: Dockerfile.release
    sbom: false
    ids:
      - gghstats
    images:
      - ghcr.io/hrodrig/gghstats
    tags:
      - "v{{ .Version }}"
      - "{{ if not .IsSnapshot }}latest{{ end }}"
    labels:
      org.opencontainers.image.title: "gghstats"
      org.opencontainers.image.description: "GitHub traffic dashboard and CLI"
      org.opencontainers.image.source: "https://github.com/hrodrig/gghstats"
      org.opencontainers.image.version: "{{ .Version }}"
    # No `annotations:` here — GoReleaser passes them as manifest index annotations; GitHub's
    # buildx setup errors with: "index annotations not supported for single platform export".

# Cosign keyless signing for container manifests built by dockers_v2.
docker_signs:
  - cmd: cosign
    env:
      - COSIGN_EXPERIMENTAL=1
    args:
      - sign
      - "${artifact}@${digest}"
      - --yes

# Homebrew: publish cask to https://github.com/hrodrig/homebrew-gghstats (brew install hrodrig/gghstats/gghstats).
# Homebrew cask push uses a maintainer PAT in CI (see .github/workflows/release.yml).
homebrew_casks:
  - name: gghstats
    ids:
      - default
    directory: Casks
    homepage: "https://github.com/hrodrig/gghstats"
    description: "Self-hosted GitHub traffic dashboard and CLI with SQLite storage"
    commit_msg_template: "Brew cask update for {{ .ProjectName }} version {{ .Tag }}"
    commit_author:
      name: Hermes Rodríguez
      email: hrodrig@usb.ve
    repository:
      owner: hrodrig
      name: homebrew-gghstats
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    url:
      verified: "github.com/hrodrig/gghstats/"
    caveats: |
      Sample environment file is not bundled with the Homebrew cask.
      Generate it with `gghstats --print-sample-config > /etc/gghstats/gghstats.env`.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/gghstats"]
          end

nfpms:
  - id: gghstats
    ids:
      - gghstats
    scripts:
      preremove: contrib/deb/prerm.sh
      postremove: contrib/deb/postrm.sh
    formats:
      - deb
      - rpm
    vendor: Hermes Rodriguez
    homepage: https://github.com/hrodrig/gghstats
    maintainer: Hermes Rodriguez <hermesrodriguez@users.noreply.github.com>
    description: Self-hosted GitHub traffic dashboard and CLI with SQLite storage
    license: MIT
    bindir: /usr/bin
    contents:
      - src: contrib/man/man1/gghstats.1.gz
        dst: /usr/share/man/man1/gghstats.1.gz
        file_info:
          mode: 0644
      # Environment file for systemd (edit token, filter, paths before use).
      - src: contrib/gghstats.env.example
        dst: /etc/gghstats/gghstats.env
        type: config|noreplace
      # systemd unit: enable with systemctl enable --now gghstats
      - src: contrib/systemd/gghstats.service
        dst: /lib/systemd/system/gghstats.service

release:
  github:
    owner: hrodrig
    name: gghstats
  header: |
    ## gghstats {{ .Tag }}
