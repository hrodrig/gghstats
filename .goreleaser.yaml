version: 2

project_name: gghstats

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: gghstats
    main: ./cmd/gghstats
    binary: gghstats
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/hrodrig/gghstats/internal/version.Version={{.Version}}
      - -X github.com/hrodrig/gghstats/internal/version.Commit={{.ShortCommit}}
      - -X github.com/hrodrig/gghstats/internal/version.BuildDate={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Docker: multi-arch image to ghcr.io (same pattern as pgwd: dockers_v2 + Dockerfile.release).
dockers_v2:
  - dockerfile: Dockerfile.release
    ids:
      - gghstats
    images:
      - ghcr.io/hrodrig/gghstats
    tags:
      - "{{ .Version }}"
      - "{{ if not .IsSnapshot }}latest{{ end }}"
    labels:
      org.opencontainers.image.title: "gghstats"
      org.opencontainers.image.description: "GitHub traffic dashboard and CLI"
      org.opencontainers.image.source: "https://github.com/hrodrig/gghstats"
      org.opencontainers.image.version: "{{ .Version }}"
    annotations:
      org.opencontainers.image.description: "GitHub traffic dashboard and CLI"

release:
  header: |
    ## gghstats {{ .Tag }}
