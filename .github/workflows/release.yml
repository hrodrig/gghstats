# Release: runs on tag push (v*). Publishes binaries and Docker image via GoReleaser.
# Trigger: git tag v0.1.1 && git push origin v0.1.1
# Requires: release-check passed before tagging (make release-check).
name: Release

permissions:
  contents: write
  packages: write

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # install-only so `make release-check` can verify `goreleaser` is on PATH (same idea as local dev).
      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          install-only: true

      - name: Run release checks
        run: make release-check

      # pgwd/.github/workflows/release.yml omits this block; on ubuntu-latest + GoReleaser 2.14,
      # dockers_v2 multi-arch failed with "Multi-platform build is not supported for the docker driver".
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GH Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
