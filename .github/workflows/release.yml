# Release: runs on tag push (v*). Publishes binaries and Docker image via GoReleaser.
# Trigger: git tag v0.1.0 && git push origin v0.1.0
# Requires: release-check passed before tagging (make release-check).
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          install-only: true

      - name: Install ripgrep (release-check semver gate)
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run release checks
        run: make release-check

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
